services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/frontend
    environment:
      - APP_EDITION=community
      - APP_LOG_LEVEL=DEBUG
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    # Uses image default CMD: node server.js (serves the built app).
    # Browser calls API at http://localhost:8000 (build-time NEXT_PUBLIC_API_URL).
    depends_on:
      api:
        condition: service_healthy
