services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_EDITION=community
      - APP_LOG_LEVEL=INFO
      - APP_RATE_LIMIT=100/minute
      - APP_RULES_CACHE_TTL_SECONDS=60
      - APP_SCAN_HISTORY_DB=/app/data/scans.db
    volumes:
      - saasshadow_data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  saasshadow_data:
